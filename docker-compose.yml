services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./database.db:/app/database.db
      - uploads:/app/uploads
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    restart: unless-stopped

  # Uncomment for production with HTTPS:
