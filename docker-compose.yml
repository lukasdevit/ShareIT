services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database.db
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    restart: unless-stopped

volumes:
  db_data:
  uploads:
  caddy_data:
