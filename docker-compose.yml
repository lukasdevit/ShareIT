services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database.db
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ''
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  caddy:
    image: caddy:alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/certs:/etc/caddy/certs
      - caddy_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

volumes:
  db_data:
  uploads:
  caddy_data:
