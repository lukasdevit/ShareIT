services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database.db
    volumes:
      - db_data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    restart: unless-stopped

  # Uncomment for production with HTTPS:
  # caddy:
  #   image: caddy:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #   restart: unless-stopped

volumes:
  db_data:
  uploads:
