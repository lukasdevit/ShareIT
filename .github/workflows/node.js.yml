name: Tests & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: cd frontend && npm ci
      - run: npm run test:run
      - run: cd frontend && npm run test

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e

            cd ~/ShareIT

            git fetch origin main
            git reset --hard origin/main

            sg docker -c "DOMAIN=${{ secrets.DOMAIN }} docker compose down"
            sg docker -c "DOMAIN=${{ secrets.DOMAIN }} docker compose up -d --build --remove-orphans"
