# Development — edit code, instant reload, no rebuild
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  api:
    command: npx tsx watch src/server.ts
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
    ports:
      - "3000:3000"  # expose directly for debugging

  web:
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3001:3001"

  # No Caddy in dev — hit API/web directly
  caddy:
    profiles: ["prod"]
