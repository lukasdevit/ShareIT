services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database.db
      - B2_ENABLED=false
    command: npx tsx watch src/server.ts
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - dev_db_data:/app/data
      - dev_uploads:/app/uploads
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - API_INTERNAL_URL=http://api:3000
      - HOSTNAME=0.0.0.0
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.ts:/app/next.config.ts
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  dev_db_data:
  dev_uploads:
