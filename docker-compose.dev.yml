services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database.db
    command: npx tsx watch src/server.ts
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - db_data:/app/data
      - uploads:/app/uploads
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    command: npm run dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  db_data:
  uploads:
